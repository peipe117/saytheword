<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Say the Word on Beat Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .rotate-y-0 { transform: rotateY(0deg); }
        
        /* Custom scrollbar for settings */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 左右晃動動畫 */
        @keyframes shake-lr {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-5px) rotate(-6deg) scale(1.1); }
            75% { transform: translateX(5px) rotate(6deg) scale(1.1); }
        }
        .shake-active {
            animation: shake-lr 0.5s ease-in-out infinite;
            display: inline-flex;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* 按鈕點擊動畫防抖 */
        .push-btn {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .push-btn:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-top: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Icon Components (SVG) ---
        const IconWrapper = ({ children, size = 24, className = "", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Play = (props) => <IconWrapper {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconWrapper>;
        const Pause = (props) => <IconWrapper {...props}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></IconWrapper>;
        const Check = (props) => <IconWrapper {...props}><polyline points="20 6 9 17 4 12"></polyline></IconWrapper>;
        const RefreshCw = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 12"></path><path d="M21 3v9h-9"></path></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></IconWrapper>;
        const Volume2 = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></IconWrapper>;
        const VolumeX = (props) => <IconWrapper {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" x2="17" y1="9" y2="15"></line><line x1="17" x2="23" y1="9" y2="15"></line></IconWrapper>;
        const Edit3 = (props) => <IconWrapper {...props}><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></IconWrapper>;
        const Repeat = (props) => <IconWrapper {...props}><path d="m17 2 4 4-4 4"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><path d="m7 22-4-4 4-4"></path><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></IconWrapper>;
        const BrainCircuit = (props) => <IconWrapper {...props}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"></path><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"></path><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"></path><path d="M3.477 10.896a4 4 0 0 1 .585-.396"></path><path d="M19.938 10.5a4 4 0 0 1 .585.396"></path><path d="M6 18a4 4 0 0 1-1.97-1.375"></path><path d="M19.97 16.625A4.002 4.002 0 0 1 18 18"></path></IconWrapper>;
        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"></path></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></IconWrapper>;
        const Trash2 = (props) => <IconWrapper {...props}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></IconWrapper>;
        const Volume = (props) => <IconWrapper {...props}><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></IconWrapper>;
        const Mic = (props) => <IconWrapper {...props}><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="23"></line><line x1="8" x2="16" y1="23" y2="23"></line></IconWrapper>;
        const Music = (props) => <IconWrapper {...props}><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></IconWrapper>;
        const Upload = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" x2="12" y1="3" y2="15"></line></IconWrapper>;
        const Megaphone = (props) => <IconWrapper {...props}><path d="m3 11 18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></IconWrapper>;
        const Zap = (props) => <IconWrapper {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></IconWrapper>;
        const Lightbulb = (props) => <IconWrapper {...props}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></IconWrapper>;
        const Exclamation = (props) => <IconWrapper {...props}><path d="M12 3v12" strokeWidth="3"></path><circle cx="12" cy="20" r="2" fill="currentColor"></circle></IconWrapper>;
        const Maximize = (props) => <IconWrapper {...props}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></IconWrapper>;
        const Minimize = (props) => <IconWrapper {...props}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></IconWrapper>;

        // --- Main Game Component ---
        const LESSONS = [
            { id: 1, name: "第一課：新同學", words: "新同學自己年跟比" },
            { id: 2, name: "第二課：我爸爸做生意", words: "外公以前工作班後" },
            { id: 3, name: "第三課：去超級市場", words: "去近買東西魚還可" },
            { id: 4, name: "第四課：我想吃漢堡", words: "出先週末晚蛋飯現點" },
            { id: 5, name: "第五課：秋天快到了", words: "黃綠色時候花子紅白" },
            { id: 6, name: "第六課：農曆新年", words: "說對星期會每給如果" },
            { id: 7, name: "第七課：早一點睡覺", words: "起累早洗昨過別忘用臉" },
            { id: 8, name: "第八課：我的寵物", words: "送隻狗帶散步貓非愛" },
            { id: 9, name: "第九課：音樂教室在北方", words: "南北方裡校門口因為所" },
            { id: 10, name: "第十課：外婆住在臺灣", words: "本著退休次旅行法國" },
            { id: 11, name: "第十一課：去動物園", words: "動物園老希望但胖真長" },
            { id: 12, name: "第十二課：打網路電話", words: "久話高課寫沒題定意思" },
            { id: 13, name: "十二生肖", words: "🐭🐮🐯🐰🐲🐍🐴🐑🐵🐔🐶🐷" }
        ];

        const STORAGE_KEY = 'beatGame_custom_list';

        // ==========================================
        // ⭐ 音樂自動播放設定區 ⭐
        // ==========================================
        // 使用 GitHub 的 raw 原始檔連結
        const DEFAULT_MUSIC_URL = "https://raw.githubusercontent.com/peipe117/saytheword/main/saytheword.m4a"; 
        const DEFAULT_MUSIC_NAME = "saytheword.m4a";
        // ==========================================

        // ⭐ 新增：Emoji 發音對照表 (確保各平台語音都能唸出正確的單字)
        const EMOJI_PRONUNCIATION_MAP = {
            "🐭": "鼠", "🐮": "牛", "🐯": "虎", "🐰": "兔",
            "🐲": "龍", "🐍": "蛇", "🐴": "馬", "🐑": "羊",
            "🐵": "猴", "🐔": "雞", "🐶": "狗", "🐷": "豬"
        };

        const BeatGame = () => {
            // 修正：使用展開運算子 [...] 取代 .split('')，以完美支援 emoji 圖案
            const [vocabList, setVocabList] = useState([...LESSONS[0].words]);
            const [activeCards, setActiveCards] = useState([]);
            const [gameStatus, setGameStatus] = useState('idle');
            const [currentBeat, setCurrentBeat] = useState(-1);
            const [introRevealedCount, setIntroRevealedCount] = useState(0); 
            const [showSettings, setShowSettings] = useState(false);
            const [tempInput, setTempInput] = useState("");
            const [bpm, setBpm] = useState(120);
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            
            // 使用上方的設定作為預設值
            const [introMusicSrc, setIntroMusicSrc] = useState(DEFAULT_MUSIC_URL);
            const [introMusicName, setIntroMusicName] = useState(DEFAULT_MUSIC_URL ? DEFAULT_MUSIC_NAME : "未選擇");
            const introAudioRef = useRef(null);
            const [selectedLesson, setSelectedLesson] = useState(1);
            const [totalRounds, setTotalRounds] = useState(5); 
            const [reshuffleOnLoop, setReshuffleOnLoop] = useState(true);
            const [difficulty, setDifficulty] = useState('easy');
            const [playMode, setPlayMode] = useState('challenge'); // 改為預設挑戰模式
            const [currentRoundDisplay, setCurrentRoundDisplay] = useState(1);
            const [isWaitingForMusic, setIsWaitingForMusic] = useState(false); // 新增等待音樂狀態
            const [isFullscreen, setIsFullscreen] = useState(false); // 追蹤全螢幕狀態

            const roundsPlayedRef = useRef(0);
            const audioContextRef = useRef(null);
            const utteranceRef = useRef(null);
            const deckRef = useRef([]); // 新增：用於記錄還沒抽過的生字牌庫（摸彩箱機制）

            const shuffleCards = useCallback((isNewGame = false) => {
                let selected = [];
                let needed = difficulty === 'easy' ? 4 : 8;
                let drawn = [];

                // 如果是新局，或是牌庫空了，就重新洗入所有的生字
                if (isNewGame === true || deckRef.current.length === 0) {
                    deckRef.current = [...vocabList].sort(() => 0.5 - Math.random());
                }

                // 從牌庫中抽出需要的數量，確保每一個生字都會被抽到
                while (drawn.length < needed) {
                    if (deckRef.current.length === 0) {
                        // 如果抽到一半沒牌了，自動重新洗牌補充，確保所有字都有均等機會出現
                        deckRef.current = [...vocabList].sort(() => 0.5 - Math.random());
                    }
                    if (deckRef.current.length === 0) break; // 避免無字可抽的無窮迴圈
                    drawn.push(deckRef.current.pop());
                }

                // 容錯防呆處理
                if (drawn.length === 0) drawn = Array(needed).fill("?");
                while (drawn.length < needed) drawn.push(drawn[0]);

                if (difficulty === 'easy') {
                    const pairs = [...drawn, ...drawn];
                    selected = pairs.sort(() => 0.5 - Math.random());
                } else {
                    selected = drawn.sort(() => 0.5 - Math.random());
                }
                setActiveCards(selected);
            }, [vocabList, difficulty]);

            useEffect(() => {
                shuffleCards(true);
                return () => {
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                };
            }, [shuffleCards]);

            const handleLessonChange = (e) => {
                const val = e.target.value;
                setGameStatus('idle');
                setCurrentBeat(-1);
                roundsPlayedRef.current = 0;
                setCurrentRoundDisplay(1);
                setIntroRevealedCount(0);

                if (val === "custom") {
                    setSelectedLesson("custom");
                    const savedList = localStorage.getItem(STORAGE_KEY);
                    if (savedList) {
                        try {
                            setVocabList(JSON.parse(savedList));
                        } catch (e) {
                            setVocabList([]);
                            openSettings();
                        }
                    } else {
                        setVocabList([]);
                        openSettings();
                    }
                } else if (val === "review") {
                    setSelectedLesson("review");
                    // 修正：支援 emoji
                    const allWords = LESSONS.flatMap(lesson => [...lesson.words]);
                    setVocabList(allWords);
                } else {
                    const lessonId = parseInt(val);
                    setSelectedLesson(lessonId);
                    const lesson = LESSONS.find(l => l.id === lessonId);
                    // 修正：支援 emoji
                    if (lesson) setVocabList([...lesson.words]);
                }
            };

            const speakWord = useCallback((text, currentBpm) => {
                if (!window.speechSynthesis || !text) return;
                window.speechSynthesis.cancel();
                
                // 檢查是否為特殊 emoji，如果是，則轉換為對應的單一中文字來發音
                const textToSpeak = EMOJI_PRONUNCIATION_MAP[text] || text;
                
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'zh-TW'; // 強制使用繁體中文(台灣)語音
                
                // 為了確保跨平台相容性，這裡可以加上語音包篩選，但通常設定 lang 就足夠
                const speechRate = Math.min(Math.max(1, currentBpm / 60), 2.5);
                utterance.rate = speechRate; 
                utteranceRef.current = utterance;
                utterance.onerror = (e) => {
                    if (e.error === 'interrupted' || e.error === 'canceled') return;
                    console.error("Speech error", e.error, e);
                };
                window.speechSynthesis.speak(utterance);
            }, []);

            const playTickSound = useCallback((frequency = 800, type = 'sine', duration = 0.1) => {
                if (!soundEnabled) return;
                try {
                    let ctx = audioContextRef.current;
                    if (!ctx) {
                        ctx = new (window.AudioContext || window.webkitAudioContext)();
                        audioContextRef.current = ctx;
                    }

                    const playNode = () => {
                        const osc = ctx.createOscillator();
                        const gainNode = ctx.createGain();
                        osc.type = type;
                        osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                        osc.connect(gainNode);
                        gainNode.connect(ctx.destination);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + duration);
                    };

                    if (ctx.state === 'suspended') {
                        ctx.resume().then(playNode);
                    } else {
                        playNode();
                    }
                } catch (e) {
                    console.error("Audio play error", e);
                }
            }, [soundEnabled]);

            const handleIntroMusicUpload = (event) => {
                const file = event.target.files?.[0];
                if (file) {
                    setIntroMusicSrc(URL.createObjectURL(file));
                    setIntroMusicName(file.name);
                }
            };

            // 1. 翻牌動畫進度
            useEffect(() => {
                let interval;
                if (gameStatus === 'intro') {
                    interval = setInterval(() => {
                        setIntroRevealedCount(prev => {
                            if (prev >= 7) {
                                clearInterval(interval);
                                playTickSound(1200, 'square', 0.08); 
                                return 8; 
                            }
                            playTickSound(1200, 'square', 0.08); 
                            return prev + 1;
                        });
                    }, 362); // 8張約 2.9 秒
                }
                return () => clearInterval(interval);
            }, [gameStatus, playTickSound]);

            // 2. 判斷翻完且音樂結束後，立即無縫接軌進入遊戲狀態
            useEffect(() => {
                if (gameStatus === 'intro' && introRevealedCount >= 8 && !isWaitingForMusic) {
                    setGameStatus('playing');
                    setCurrentBeat(-1);
                }
            }, [gameStatus, introRevealedCount, isWaitingForMusic]);

            // 3. 使用 useRef 穩定節奏，防止畫面重新渲染影響節拍器
            const beatStateRef = useRef({ currentBeat, playMode, bpm, activeCards });
            useEffect(() => {
                beatStateRef.current = { currentBeat, playMode, bpm, activeCards };
            }, [currentBeat, playMode, bpm, activeCards]);

            // 4. ⭐ 核心：完美無縫節拍器 (改用遞迴 setTimeout，解決音效重疊問題)
            useEffect(() => {
                let timer;
                if (gameStatus === 'playing') {
                    const tick = () => {
                        const state = beatStateRef.current;
                        
                        // 若 8 張牌已輪完，關閉節拍器並進入等待蓋牌
                        if (state.currentBeat >= 7) {
                            setCurrentBeat(9);
                            return; 
                        }
                        
                        const nextBeat = state.currentBeat + 1;
                        if (nextBeat >= 0 && nextBeat <= 7) {
                            if (state.playMode === 'practice') {
                                const wordToRead = state.activeCards[nextBeat];
                                if (wordToRead) speakWord(wordToRead, state.bpm);
                            } else {
                                playTickSound(1000, 'triangle', 0.1); 
                            }
                        }
                        setCurrentBeat(nextBeat); // 觸發畫面更新與黃框閃爍
                        
                        // 排程下一拍
                        timer = setTimeout(tick, 60000 / state.bpm);
                    };

                    // ⭐ 關鍵修正：不論是否為剛開始，都給予「剛好 1 個節拍」的緩衝時間再閃爍
                    // 這樣第8張牌的翻牌音效與第1個黃框音效就不會在 0ms 撞在一起，且完美符合音樂節奏
                    timer = setTimeout(tick, 60000 / beatStateRef.current.bpm);
                }
                return () => clearTimeout(timer); // 確保每次狀態變更時安全清除計時器
            }, [gameStatus, speakWord, playTickSound]);

            // 5. 局末等待蓋牌 (1 秒)
            useEffect(() => {
                let timer;
                if (gameStatus === 'playing' && currentBeat === 9) {
                    timer = setTimeout(() => {
                        if (roundsPlayedRef.current < totalRounds - 1) {
                            playTickSound(600, 'square', 0.08); 
                            setTimeout(() => playTickSound(600, 'square', 0.08), 150); 
                            setCurrentBeat(8); // 觸發背面顯示
                        } else {
                            playTickSound(400, 'sine', 0.5);
                            setGameStatus('idle');
                            setCurrentBeat(8);
                            setIntroRevealedCount(0);
                            if (introAudioRef.current) {
                                introAudioRef.current.pause();
                                introAudioRef.current.currentTime = 0;
                            }
                        }
                    }, 1000); // 1秒後蓋牌
                }
                return () => clearTimeout(timer);
            }, [gameStatus, currentBeat, totalRounds, playTickSound]);

            // 6. 蓋牌翻轉動畫 (0.6 秒後洗牌進下一局)
            useEffect(() => {
                let timer;
                if (gameStatus === 'playing' && currentBeat === 8) {
                    timer = setTimeout(() => {
                        roundsPlayedRef.current += 1;
                        setCurrentRoundDisplay(roundsPlayedRef.current + 1);
                        setBpm(prev => prev + 5 > 160 ? 160 : prev + 5);
                        if (reshuffleOnLoop) shuffleCards(false);
                        setIntroRevealedCount(0);
                        setGameStatus('intro');
                        setCurrentBeat(-1); 

                        if (introAudioRef.current && introMusicSrc) {
                            setIsWaitingForMusic(true);
                            introAudioRef.current.currentTime = 0;
                            introAudioRef.current.play().catch(e => {
                                console.log("Intro music play failed", e);
                                setIsWaitingForMusic(false);
                            });
                        } else {
                            setIsWaitingForMusic(false);
                        }
                    }, 600);
                }
                return () => clearTimeout(timer);
            }, [gameStatus, currentBeat, reshuffleOnLoop, shuffleCards, introMusicSrc]);

            const handleStart = () => {
                // 解鎖 AudioContext
                if (!audioContextRef.current) {
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContextRef.current.state === 'suspended') {
                    audioContextRef.current.resume();
                }

                // 解鎖 SpeechSynthesis (確保 Safari/iOS 上練習模式能正常發音)
                if (window.speechSynthesis) {
                    const dummy = new SpeechSynthesisUtterance('');
                    dummy.volume = 0;
                    window.speechSynthesis.speak(dummy);
                    window.speechSynthesis.cancel();
                }

                if (gameStatus === 'idle') {
                    if ((currentBeat !== -1 && currentBeat !== 8) || (currentBeat === -1 && introRevealedCount >= 8)) {
                        setGameStatus('playing');
                    } else {
                        roundsPlayedRef.current = 0; 
                        setCurrentRoundDisplay(1);
                        shuffleCards(true); 
                        setCurrentBeat(-1);
                        setIntroRevealedCount(0);
                        setGameStatus('intro'); 

                        if (introAudioRef.current && introMusicSrc) {
                            setIsWaitingForMusic(true);
                            introAudioRef.current.currentTime = 0;
                            introAudioRef.current.play().catch(e => {
                                console.log("Intro music play failed", e);
                                setIsWaitingForMusic(false);
                            });
                        } else {
                            setIsWaitingForMusic(false);
                        }
                    }
                } else {
                    setGameStatus('idle');
                    window.speechSynthesis.cancel();
                    if (introAudioRef.current) introAudioRef.current.pause();
                }
            };

            const handleReset = () => {
                setGameStatus('idle');
                setCurrentBeat(-1);
                roundsPlayedRef.current = 0;
                setCurrentRoundDisplay(1); 
                setIntroRevealedCount(0);
                setIsWaitingForMusic(false); 
                window.speechSynthesis.cancel();
                if (introAudioRef.current) {
                    introAudioRef.current.pause();
                    introAudioRef.current.currentTime = 0;
                }
                shuffleCards(true); 
            };

            const saveCustomList = () => {
                const list = tempInput.split(/[\n,、]+/).map(s => s.trim()).filter(s => s.length > 0);
                if (list.length >= 4) {
                    setVocabList(list);
                    setSelectedLesson("custom"); 
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
                    setShowSettings(false);
                    setErrorMsg("");
                    handleReset();
                } else {
                    setErrorMsg("請至少輸入 4 個生字或圖案！");
                }
            };

            const clearCustomList = () => {
                if (window.confirm("確定要刪除已儲存的自定義生字嗎？此動作無法復原。")) {
                    localStorage.removeItem(STORAGE_KEY);
                    setTempInput("");
                    if (selectedLesson === "custom") {
                        setSelectedLesson(1);
                        // 修正：支援 emoji
                        setVocabList([...LESSONS[0].words]);
                        handleReset();
                    }
                    setErrorMsg("已清除自定義紀錄");
                }
            };

            const openSettings = () => {
                if (selectedLesson === "custom" && vocabList.length > 0) {
                     setTempInput(vocabList.join("、"));
                } else {
                     setTempInput(""); 
                     const saved = localStorage.getItem(STORAGE_KEY);
                     if (saved) {
                         try { setTempInput(JSON.parse(saved).join("、")); } catch (e) {}
                     }
                }
                setErrorMsg("");
                setShowSettings(true);
            };

            // 監聽鍵盤 ESC 退出全螢幕的狀態變化
            useEffect(() => {
                const handleFullscreenChange = () => {
                    setIsFullscreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.error(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            };

            const isInitial = gameStatus === 'idle' && currentBeat === -1 && introRevealedCount === 0;
            const isPlaying = gameStatus === 'playing' || gameStatus === 'intro';
            const isGameOver = gameStatus === 'idle' && currentBeat === 8;
            const isPaused = gameStatus === 'idle' && !isInitial && !isGameOver;

            return (
                <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-50 via-slate-100 to-purple-50 flex flex-col items-center justify-center p-4 md:p-8 font-sans text-slate-800 overflow-x-hidden relative">
                    
                    <audio 
                        ref={introAudioRef} 
                        src={introMusicSrc} 
                        onEnded={() => {
                            if (gameStatus === 'intro') setIsWaitingForMusic(false);
                        }}
                        onError={(e) => {
                            console.log("Audio load error", e);
                            setIsWaitingForMusic(false);
                        }}
                    />

                    {/* 頂部標題與控制面板 */}
                    <div className="w-full max-w-5xl mb-6 flex flex-col items-start gap-4 bg-white/70 backdrop-blur-xl p-5 md:p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-white z-30 relative">
                        <div className="w-full flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex flex-col gap-2">
                                <div>
                                    {/* 修正：將漸層特效移到文字專屬的 span 中，避免影響到表情符號 */}
                                    <h1 className="text-3xl md:text-4xl font-black flex items-center gap-2 md:gap-3 drop-shadow-sm pb-1">
                                        <div className="flex-shrink-0 flex items-center justify-center w-12 h-12 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-2xl shadow-inner border border-white transform -rotate-6">
                                            <span className="text-2xl drop-shadow-md">🎶</span>
                                        </div>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">
                                            Say the Word on Beat
                                        </span>
                                    </h1>
                                    {/* 移除原本的 ml-[3.5rem] md:ml-[4.25rem] 讓這裡完全靠左對齊 */}
                                    <div className="flex items-center gap-2 flex-wrap mt-3">
                                        <span className="bg-indigo-50/80 text-indigo-600 text-xs md:text-sm font-bold px-3 py-1.5 rounded-full border border-indigo-100 shadow-sm tracking-wide shrink-0">
                                            📚 學華語向前走 第二冊
                                        </span>
                                        <select 
                                            value={selectedLesson}
                                            onChange={handleLessonChange}
                                            className="max-w-[180px] md:max-w-[240px] py-1.5 pl-3 pr-8 bg-white border border-indigo-200 hover:border-indigo-300 shadow-sm rounded-full text-indigo-700 text-xs md:text-sm font-bold focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none cursor-pointer transition-all appearance-none truncate"
                                            style={{backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%234f46e5' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 7l5 5 5-5'/%3e%3c/svg%3e")`, backgroundPosition: `right 0.5rem center`, backgroundRepeat: `no-repeat`, backgroundSize: `1.2em 1.2em`}}
                                        >
                                            {LESSONS.map(lesson => (
                                                <option key={lesson.id} value={lesson.id}>{lesson.name}</option>
                                            ))}
                                            <option disabled>──────────</option>
                                            <option value="review">🔄 綜合複習 (全 12 課隨機)</option>
                                            <option value="custom">✏️ 自定義生字 (我的最愛)</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 text-sm text-slate-500 mt-1 flex-wrap">
                                    <span className={`px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-sm border ${difficulty === 'easy' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`}>
                                        {difficulty === 'easy' ? <Sparkles size={12} /> : <BrainCircuit size={12} />}
                                        {difficulty === 'easy' ? '簡單模式' : '進階模式'}
                                    </span>
                                    <span className={`px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-sm border ${playMode === 'practice' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                        {playMode === 'practice' ? <Volume size={12} /> : <Mic size={12} />}
                                        {playMode === 'practice' ? '練習模式 (自動發音跟讀)' : '挑戰模式 (無發音)'}
                                    </span>
                                    {totalRounds > 1 ? (
                                        <span className="text-xs bg-indigo-50 border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full font-bold flex items-center gap-1.5 shadow-sm">
                                            <Repeat size={12} />
                                            闖關模式：共 {totalRounds} 關
                                        </span>
                                    ) : (
                                        <span className="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-bold shadow-sm border border-slate-200">
                                            單局練習
                                        </span>
                                    )}
                                </div>
                            </div>

                            <div className="flex items-center gap-3 flex-wrap justify-end">
                                <div className="flex items-center gap-2 bg-white/80 border border-slate-200 shadow-sm px-4 py-2 rounded-xl">
                                    <span className="text-xs font-black text-slate-400 uppercase tracking-wider">BPM</span>
                                    <input 
                                        type="range" min="40" max="180" step="5" value={bpm} 
                                        onChange={(e) => setBpm(parseInt(e.target.value))}
                                        className="w-24 accent-indigo-500 cursor-pointer"
                                    />
                                    <span className="text-sm font-black w-8 text-center text-indigo-600">{bpm}</span>
                                </div>
                                <button 
                                    onClick={() => setSoundEnabled(!soundEnabled)}
                                    className={`p-2.5 rounded-xl shadow-sm border transition-all hover:scale-105 active:scale-95 ${soundEnabled ? 'bg-indigo-50 border-indigo-200 text-indigo-600' : 'bg-slate-100 border-slate-200 text-slate-400'}`}
                                    title={soundEnabled ? "關閉音效" : "開啟音效"}
                                >
                                    {soundEnabled ? <Volume2 size={20} /> : <VolumeX size={20} />}
                                </button>
                                <button 
                                    onClick={toggleFullscreen}
                                    className="p-2.5 rounded-xl shadow-sm border transition-all hover:scale-105 active:scale-95 bg-white border-slate-200 text-slate-600 hover:text-indigo-600 hover:bg-slate-50"
                                    title={isFullscreen ? "退出全螢幕" : "全螢幕"}
                                >
                                    {isFullscreen ? <Minimize size={20} /> : <Maximize size={20} />}
                                </button>
                                <button 
                                    onClick={openSettings}
                                    className="flex items-center gap-1.5 px-4 py-2.5 bg-white border border-slate-200 shadow-sm hover:bg-slate-50 hover:border-slate-300 rounded-xl font-bold text-slate-700 transition-all hover:scale-105 active:scale-95"
                                >
                                    <Settings size={18} /> 設定
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 主要遊戲區 */}
                    <div className="w-full max-w-5xl relative mt-4 md:mt-6 mb-12 px-4 md:px-12">
                        
                        <div className="flex justify-center mb-6 z-30 relative">
                            <div className="bg-white/90 backdrop-blur-md border border-indigo-100 shadow-[0_8px_20px_rgba(79,70,229,0.15)] p-2 rounded-full flex items-center justify-center transform transition-all hover:scale-105">
                                <div className="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-6 py-1.5 rounded-full font-black text-xl md:text-2xl shadow-inner tracking-widest flex items-baseline gap-1.5">
                                    {currentRoundDisplay} <span className="text-indigo-200 text-lg md:text-xl font-bold">/</span> {totalRounds}
                                </div>
                            </div>
                        </div>

                        <div className={`absolute -top-6 left-0 md:-top-10 md:left-4 text-blue-500 z-20 transition-all ${gameStatus === 'playing' || gameStatus === 'intro' ? 'shake-active text-blue-500 scale-110' : 'drop-shadow-md opacity-80'}`}>
                            <Megaphone size={56} className="w-12 h-12 md:w-16 md:h-16" />
                        </div>
                        <div className={`absolute -top-6 right-0 md:-top-10 md:right-4 text-yellow-400 z-20 flex transition-all ${gameStatus === 'playing' || gameStatus === 'intro' ? 'shake-active text-yellow-400 scale-110' : 'drop-shadow-md opacity-80'}`}>
                            <Zap size={56} className="translate-x-3 w-12 h-12 md:w-16 md:h-16" />
                            <Zap size={56} className="-translate-x-3 opacity-60 w-12 h-12 md:w-16 md:h-16" />
                        </div>
                        <div className={`absolute -bottom-10 left-0 md:-bottom-16 md:left-4 text-rose-500 z-20 transition-all ${gameStatus === 'playing' || gameStatus === 'intro' ? 'shake-active text-rose-500 scale-110' : 'drop-shadow-md opacity-80'}`}>
                            <Exclamation size={56} className="w-12 h-12 md:w-16 md:h-16" />
                        </div>
                        <div className={`absolute -bottom-10 right-0 md:-bottom-16 md:right-4 text-amber-500 z-20 transition-all ${gameStatus === 'playing' || gameStatus === 'intro' ? 'shake-active text-amber-500 scale-110' : 'drop-shadow-md opacity-80'}`}>
                            <Lightbulb size={56} className="w-12 h-12 md:w-16 md:h-16" />
                        </div>

                        <div className="grid grid-cols-4 gap-4 md:gap-6 w-full aspect-[2/1.1] md:aspect-[8/3.2] relative z-10">
                            {activeCards.map((word, index) => {
                                let isRevealed = false;
                                let isHighlighted = false;

                                if (gameStatus === 'intro') {
                                    isRevealed = index < introRevealedCount;
                                } else if (gameStatus === 'playing') {
                                    isRevealed = currentBeat !== 8;
                                    isHighlighted = index === currentBeat;
                                } else if (gameStatus === 'idle') {
                                    isRevealed = (currentBeat >= 0 && currentBeat !== 8) || (currentBeat === -1 && introRevealedCount >= 8);
                                }
                                
                                return (
                                    <div key={index} className="relative w-full h-full perspective-1000">
                                        <div 
                                            className={`relative w-full h-full duration-500 preserve-3d transition-transform ${isRevealed ? 'rotate-y-0' : 'rotate-y-180'}`}
                                            style={{ transformStyle: 'preserve-3d', transform: isRevealed ? 'rotateY(0deg)' : 'rotateY(180deg)' }}
                                        >
                                            <div className={`absolute w-full h-full backface-hidden rounded-3xl flex items-center justify-center text-4xl md:text-5xl lg:text-6xl font-black select-none
                                                ${isHighlighted 
                                                    ? 'bg-gradient-to-b from-yellow-50 to-yellow-100 border-x-4 border-t-4 border-b-[8px] border-yellow-400 text-indigo-800 scale-[1.08] z-20 shadow-[0_0_35px_rgba(250,204,21,0.6)] ring-4 ring-yellow-400/30' 
                                                    : 'bg-white border-x-2 border-t-2 border-b-[8px] border-slate-200 text-slate-700 scale-100 shadow-[0_8px_15px_rgba(0,0,0,0.05)]'}
                                                transition-all duration-200
                                            `}>
                                                {word}
                                            </div>

                                            <div 
                                                className="absolute w-full h-full backface-hidden rounded-3xl shadow-[0_10px_20px_rgba(79,70,229,0.3)] bg-gradient-to-br from-indigo-500 via-purple-600 to-violet-700 flex items-center justify-center border-x-2 border-t-2 border-b-[8px] border-indigo-800/80 overflow-hidden"
                                                style={{ transform: 'rotateY(180deg)' }}
                                            >
                                                <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent"></div>
                                                <span className="text-white/30 text-5xl md:text-6xl font-black drop-shadow-md select-none">{index + 1}</span>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 底部按鈕 */}
                    <div className="mt-6 md:mt-10 flex justify-center gap-8 z-30 relative">
                        {isInitial && (
                            <button onClick={handleStart} className="group flex flex-col items-center gap-3">
                                <div className="push-btn w-20 h-20 bg-gradient-to-b from-indigo-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(79,70,229,0.3)] border-b-[6px] border-indigo-800 hover:brightness-110">
                                    <Play fill="white" className="ml-1.5 text-white" size={36} />
                                </div>
                                <span className="font-bold text-indigo-700 tracking-wide text-lg">開始遊戲</span>
                            </button>
                        )}

                        {isPlaying && (
                            <button onClick={() => { setGameStatus('idle'); window.speechSynthesis.cancel(); if (introAudioRef.current) introAudioRef.current.pause(); }} className="group flex flex-col items-center gap-3">
                                <div className="push-btn w-20 h-20 bg-gradient-to-b from-red-500 to-rose-600 rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(225,29,72,0.3)] border-b-[6px] border-red-800 hover:brightness-110">
                                    <Pause fill="white" className="text-white" size={36} />
                                </div>
                                <span className="font-bold text-red-600 tracking-wide text-lg">暫停</span>
                            </button>
                        )}

                        {isPaused && (
                            <div className="flex gap-8">
                                <button onClick={() => setGameStatus('playing')} className="group flex flex-col items-center gap-3">
                                    <div className="push-btn w-20 h-20 bg-gradient-to-b from-emerald-500 to-green-500 rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(16,185,129,0.3)] border-b-[6px] border-emerald-800 hover:brightness-110">
                                        <Play fill="white" className="ml-1.5 text-white" size={36} />
                                    </div>
                                    <span className="font-bold text-emerald-700 tracking-wide text-lg">繼續</span>
                                </button>
                                <button onClick={handleReset} className="group flex flex-col items-center gap-3">
                                    <div className="push-btn w-20 h-20 bg-gradient-to-b from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(245,158,11,0.3)] border-b-[6px] border-amber-700 hover:brightness-110">
                                        <Repeat className="text-white" size={32} strokeWidth="3" />
                                    </div>
                                    <span className="font-bold text-amber-700 tracking-wide text-lg">重置</span>
                                </button>
                            </div>
                        )}

                        {isGameOver && (
                            <div className="flex gap-8 animate-in fade-in zoom-in duration-300">
                                <button onClick={handleReset} className="group flex flex-col items-center gap-3">
                                    <div className="push-btn w-20 h-20 bg-gradient-to-b from-slate-500 to-slate-600 rounded-2xl flex items-center justify-center shadow-[0_10px_20px_rgba(100,116,139,0.3)] border-b-[6px] border-slate-700 hover:brightness-110">
                                        <Check className="text-white" size={40} strokeWidth="4" />
                                    </div>
                                    <span className="font-bold text-slate-600 tracking-wide text-lg">結束</span>
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="mt-12 text-slate-400/80 text-sm font-bold tracking-widest z-30 relative uppercase">
                        Created by Sophia Wong
                    </div>

                    {/* 設定 Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] border border-white/50 w-full max-w-xl overflow-hidden animate-in fade-in zoom-in duration-200 flex flex-col max-h-[90vh]">
                                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-gradient-to-r from-indigo-50 to-white">
                                    <h2 className="text-xl font-black text-indigo-900 flex items-center gap-2">
                                        <Settings size={22} className="text-indigo-600" /> 遊戲設定
                                    </h2>
                                    <button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors">
                                        <X size={24} />
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100/80 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                                            <div className="bg-white p-1.5 rounded shadow-sm text-indigo-500"><Music size={16} /></div> 
                                            開場音樂設定
                                        </h3>
                                        <div className="flex flex-col gap-3">
                                            <div className="text-sm text-slate-600 bg-white px-3 py-2 rounded-lg border border-slate-100">
                                                目前音樂：<span className="font-bold text-indigo-600 truncate inline-block align-bottom max-w-[200px]">{introMusicName}</span>
                                            </div>
                                            <label className="flex items-center justify-center gap-2 px-4 py-3 rounded-xl cursor-pointer transition-colors border-2 border-dashed border-indigo-200 hover:border-indigo-400 hover:bg-indigo-50/50 group">
                                                <input type="file" accept="audio/*" onChange={handleIntroMusicUpload} className="hidden" />
                                                <Upload size={18} className="text-indigo-400 group-hover:text-indigo-600" />
                                                <span className="text-sm font-bold text-indigo-600">上傳開場音樂 (單次覆蓋)</span>
                                            </label>
                                            <p className="text-xs text-slate-400 font-medium">支援 .mp3, .m4a, .wav 等格式。上傳僅供單次使用，若要永久更改，請修改程式碼中的 DEFAULT_MUSIC_URL。</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100/80 shadow-sm">
                                            <h3 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                                                <div className="bg-white p-1.5 rounded shadow-sm text-blue-500"><Mic size={16} /></div> 
                                                模式選擇
                                            </h3>
                                            <div className="flex flex-col gap-3">
                                                <label className={`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${playMode === 'practice' ? 'bg-blue-50/50 border-blue-400' : 'border-transparent bg-white hover:border-slate-200'}`}>
                                                    <input type="radio" name="playMode" value="practice" checked={playMode === 'practice'} onChange={() => setPlayMode('practice')} className="mt-1 w-4 h-4 text-blue-600 accent-blue-600" />
                                                    <div>
                                                        <span className="block font-bold text-slate-800 text-sm">練習模式 (自動發音)</span>
                                                        <span className="text-xs text-slate-500 leading-relaxed block mt-1">電腦自動發音，帶領學生跟讀。</span>
                                                    </div>
                                                </label>
                                                <label className={`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${playMode === 'challenge' ? 'bg-red-50/50 border-red-400' : 'border-transparent bg-white hover:border-slate-200'}`}>
                                                    <input type="radio" name="playMode" value="challenge" checked={playMode === 'challenge'} onChange={() => setPlayMode('challenge')} className="mt-1 w-4 h-4 text-red-600 accent-red-600" />
                                                    <div>
                                                        <span className="block font-bold text-slate-800 text-sm">挑戰模式</span>
                                                        <span className="text-xs text-slate-500 leading-relaxed block mt-1">不讀字，僅播放節拍。</span>
                                                    </div>
                                                </label>
                                            </div>
                                        </div>
                                        
                                        <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100/80 shadow-sm">
                                            <h3 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                                                <div className="bg-white p-1.5 rounded shadow-sm text-green-500"><BrainCircuit size={16} /></div> 
                                                卡片難度
                                            </h3>
                                            <div className="flex flex-col gap-3">
                                                <label className={`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${difficulty === 'easy' ? 'bg-green-50/50 border-green-400' : 'border-transparent bg-white hover:border-slate-200'}`}>
                                                    <input type="radio" name="difficulty" value="easy" checked={difficulty === 'easy'} onChange={() => setDifficulty('easy')} className="mt-1 w-4 h-4 text-green-600 accent-green-600" />
                                                    <div>
                                                        <span className="block font-bold text-slate-800 text-sm">簡單 (4個字x2)</span>
                                                    </div>
                                                </label>
                                                <label className={`flex items-start gap-3 p-3 rounded-xl border-2 cursor-pointer transition-all ${difficulty === 'advanced' ? 'bg-orange-50/50 border-orange-400' : 'border-transparent bg-white hover:border-slate-200'}`}>
                                                    <input type="radio" name="difficulty" value="advanced" checked={difficulty === 'advanced'} onChange={() => setDifficulty('advanced')} className="mt-1 w-4 h-4 text-orange-600 accent-orange-600" />
                                                    <div>
                                                        <span className="block font-bold text-slate-800 text-sm">進階 (8個不重複)</span>
                                                    </div>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100/80 shadow-sm">
                                        <h3 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                                            <div className="bg-white p-1.5 rounded shadow-sm text-indigo-500"><Repeat size={16} /></div> 
                                            遊戲局數設定
                                        </h3>
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-3 gap-3">
                                                <button onClick={() => setTotalRounds(1)} className={`py-2 px-2 md:px-3 rounded-xl border-2 font-bold text-xs md:text-sm transition-all ${totalRounds === 1 ? 'bg-indigo-50 border-indigo-400 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}>單局 (1次)</button>
                                                <button onClick={() => setTotalRounds(5)} className={`py-2 px-2 md:px-3 rounded-xl border-2 font-bold text-xs md:text-sm transition-all ${totalRounds === 5 ? 'bg-indigo-50 border-indigo-400 text-indigo-700 shadow-sm' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}>闖關 (5次)</button>
                                                <div className="flex items-center gap-1 md:gap-2 bg-white border-2 border-slate-200 rounded-xl px-2 focus-within:border-indigo-400 transition-colors">
                                                    <span className="text-xs font-bold text-slate-400 whitespace-nowrap">自訂</span>
                                                    <input 
                                                        type="number" min="1" max="50" value={totalRounds}
                                                        onChange={(e) => setTotalRounds(Math.max(1, parseInt(e.target.value) || 1))}
                                                        className="w-full bg-transparent text-center font-bold text-indigo-600 outline-none text-sm md:text-base"
                                                    />
                                                </div>
                                            </div>
                                            <label className="flex items-center gap-3 p-3 bg-white rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors">
                                                <input 
                                                    type="checkbox" id="reshuffle" checked={reshuffleOnLoop}
                                                    onChange={(e) => setReshuffleOnLoop(e.target.checked)}
                                                    className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 accent-indigo-600"
                                                />
                                                <span className="text-sm font-bold text-slate-700 select-none">每局更換新的生字 (重新洗牌)</span>
                                            </label>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-slate-800 mb-2 flex items-center gap-2">
                                            <div className="bg-indigo-50 p-1.5 rounded text-indigo-600"><Edit3 size={16} /></div>
                                            自定義生字庫
                                        </label>
                                        <textarea 
                                            value={tempInput}
                                            onChange={(e) => setTempInput(e.target.value)}
                                            className="w-full h-28 p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:ring-0 focus:border-indigo-500 resize-none text-base font-medium shadow-inner transition-colors"
                                            placeholder="例如：蘋果, 香蕉, 🚗, ✈️ (用逗號分隔)"
                                        ></textarea>
                                        {errorMsg && <p className="text-sm text-rose-500 mt-2 font-bold flex items-center gap-1"><Exclamation size={14}/> {errorMsg}</p>}
                                    </div>
                                </div>

                                <div className="p-5 border-t border-slate-100 flex justify-between items-center bg-slate-50/80 backdrop-blur-sm">
                                    <button 
                                        onClick={clearCustomList}
                                        className="text-slate-400 hover:text-rose-600 text-sm font-bold flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-rose-50 transition-colors"
                                    >
                                        <Trash2 size={16} /> 清除紀錄
                                    </button>
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={() => setShowSettings(false)}
                                            className="px-5 py-2.5 text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-xl font-bold transition-colors"
                                        >
                                            確定
                                        </button>
                                        <button 
                                            onClick={saveCustomList}
                                            className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-[0_4px_10px_rgba(79,70,229,0.3)] transition-transform active:scale-95"
                                        >
                                            儲存設定
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BeatGame />);
    </script>
</body>
</html>
